name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - "packages/*/package.json"
      - ".dockerignore"
      - "bun.lock"
      - "package.json"
      - "turbo.json"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy . --config apps/docs/fly.toml --dockerfile apps/docs/Dockerfile --ignorefile .dockerignore --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
